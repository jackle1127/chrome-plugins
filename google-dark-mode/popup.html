<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: contain;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .header-sub {
      font-size: 11px;
      color: #6c7086;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #313244;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .toggle-label {
      font-size: 12px;
      color: #bac2de;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #45475a;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #cdd6f4;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #89b4fa;
    }

    input:checked + .slider::before {
      transform: translateX(16px);
    }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding: 8px 12px;
      background: #313244;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .refresh-row.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .refresh-hint {
      font-size: 11px;
      color: #6c7086;
    }

    .refresh-btn {
      font-size: 11px;
      color: #89b4fa;
      background: none;
      border: 1px solid #89b4fa;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    .refresh-btn:hover {
      background: #89b4fa22;
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="header-icon" src="icons/icon48.png" alt="icon">
    <div>
      <div class="header-title">Dark Mode</div>
      <div class="header-sub">Google Docs &amp; Sheets</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable dark mode</span>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="refresh-row" id="refresh-row">
    <span class="refresh-hint">Refresh to apply fully</span>
    <button class="refresh-btn" id="refresh-btn">Refresh</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
